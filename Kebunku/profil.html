<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>siPanen - Dashboard Pengguna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAF9; display: flex; margin: 0; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 280px; background: #064E3B; color: white; padding: 2.5rem 1.5rem; position: fixed; height: 100vh; z-index: 100; }
        .nav-link { display: flex; align-items: center; gap: 1rem; padding: 1rem; border-radius: 1.2rem; color: rgba(255,255,255,0.5); text-decoration: none; font-weight: 600; margin-bottom: 0.5rem; transition: 0.3s; cursor: pointer; }
        .nav-link.active { background: #10B981; color: white; }
        
        .main-content { margin-left: 280px; flex: 1; padding: 2.5rem; width: calc(100% - 280px); }

        /* Dropdown & Tabs */
        .dropdown-menu { display: none; position: absolute; top: 60px; right: 0; background: white; border-radius: 1.5rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border: 1px solid #f1f5f9; z-index: 1000; overflow: hidden; }
        .show { display: block !important; animation: fadeIn 0.2s ease-out; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.4s ease-in-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-box { width: 100%; background: #F1F5F9; border-radius: 1rem; padding: 1rem; font-weight: 600; outline: none; border: 2px solid transparent; transition: 0.3s; }
        .input-box:focus { border-color: #10B981; background: white; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="flex items-center gap-3 mb-12 px-2">
            <i class="fas fa-leaf text-3xl text-emerald-400"></i>
            <span class="text-2xl font-extrabold italic text-white">siPanen</span>
        </div>
        <nav>
            <div onclick="showPage('dashboard', this)" class="nav-link active">
                <i class="fas fa-home"></i> Ringkasan
            </div>
            <div onclick="showPage('profil', this)" class="nav-link">
                <i class="fas fa-user-circle"></i> Edit Biodata
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="flex justify-between items-center mb-10">
            <div class="bg-white px-6 py-2.5 rounded-full shadow-sm border border-slate-100 flex items-center gap-3 font-bold text-slate-600 text-sm">
                <i class="fas fa-cloud-sun text-amber-500"></i> 28°C Surakarta, ID
            </div>
            
            <div class="flex items-center gap-4 relative">
                <button class="w-10 h-10 bg-[#E9F7F2] rounded-full flex items-center justify-center border border-emerald-100 text-emerald-600 hover:bg-emerald-200">
                    <i class="fas fa-envelope"></i>
                </button>

                <div class="relative">
                    <div onclick="toggleDropdown()" class="w-10 h-10 bg-[#10B981] rounded-full flex items-center justify-center text-white font-bold shadow-lg cursor-pointer hover:scale-110 transition-transform">
                        <span id="initialNav">P</span>
                    </div>
                    <div id="profileMenu" class="dropdown-menu w-64">
                        <div class="p-4 border-b border-slate-50 bg-slate-50 text-center">
                            <p id="namaDashMenu" class="text-sm font-bold text-slate-800">Petani</p>
                            <p id="emailDashMenu" class="text-[10px] text-slate-400">petani@sipanen.com</p>
                        </div>
                        <div onclick="showPage('profil', document.querySelectorAll('.nav-link')[1])" class="px-4 py-3 text-xs font-bold text-slate-600 hover:bg-slate-50 cursor-pointer border-b border-slate-50">
                            <i class="fas fa-id-card mr-2 text-emerald-500"></i> Lihat Biodata
                        </div>
                        <div class="px-4 py-3 text-xs font-bold text-red-500 hover:bg-red-50 cursor-pointer">
                            <i class="fas fa-sign-out-alt mr-2"></i> Keluar
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <section id="dashboard" class="page-section active">
            <div class="bg-[url('https://images.unsplash.com/photo-1500382017468-9049fed747ef')] bg-cover bg-center h-[280px] rounded-[3rem] p-12 flex flex-col justify-center text-white relative overflow-hidden shadow-2xl mb-10">
                <div class="absolute inset-0 bg-black/30"></div>
                <div class="relative z-10">
                    <h1 class="text-5xl font-extrabold mb-2">Halo, <span id="sapaan">Petani</span>! 👋</h1>
                    <p class="text-lg opacity-90 font-medium">Selamat datang di panel pengelolaan lahan Anda.</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Estimasi Profit</p>
                    <p class="text-xl font-black text-[#064E3B]">Rp 180.000.000</p>
                </div>
                <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Kesehatan Tanaman</p>
                    <p class="text-xl font-black text-emerald-500">94% Optimal</p>
                </div>
                <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Lokasi Lahan</p>
                    <p id="lahanDash" class="text-sm font-black text-slate-600 italic">Belum diatur</p>
                </div>
            </div>
        </section>

        <section id="profil" class="page-section">
            <div class="max-w-2xl mx-auto">
                <h1 class="text-3xl font-extrabold text-[#064E3B] mb-8 text-center">Biodata Pengguna</h1>
                
                <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100">
                    <div id="avatarBesar" class="w-24 h-24 bg-emerald-500 rounded-full flex items-center justify-center text-white text-4xl font-bold border-8 border-emerald-50 mx-auto mb-8">P</div>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Nama Lengkap</label>
                            <input type="text" id="namaInput" class="input-box" placeholder="Nama lengkap Anda">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Alamat Email</label>
                            <input type="email" id="emailInput" class="input-box" placeholder="contoh@email.com">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Lokasi Lahan</label>
                            <textarea id="lahanInput" class="input-box h-24" placeholder="Masukkan alamat lengkap lahan Anda"></textarea>
                        </div>
                    </div>

                    <button onclick="saveProfile()" class="mt-8 w-full bg-[#064E3B] text-white py-5 rounded-2xl font-bold text-lg shadow-xl hover:bg-emerald-800 transition-all flex items-center justify-center gap-3">
                        <i class="fas fa-save"></i> Simpan Biodata
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        function showPage(pageId, navEl) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            navEl.classList.add('active');
            document.getElementById('profileMenu').classList.remove('show');
        }

        function toggleDropdown() {
            document.getElementById('profileMenu').classList.toggle('show');
        }

        window.onload = function() {
            renderData();
        };

        function renderData() {
            const stored = localStorage.getItem('siPanen_Biodata');
            if(stored) {
                const data = JSON.parse(stored);
                
                // Update Dashboard
                document.getElementById('sapaan').innerText = data.nama || "Petani";
                document.getElementById('namaDashMenu').innerText = data.nama || "Petani";
                document.getElementById('emailDashMenu').innerText = data.email || "petani@sipanen.com";
                document.getElementById('lahanDash').innerText = data.lahan || "Lokasi belum diatur";

                // Update Inisial Huruf Otomatis
                if(data.nama) {
                    const initial = data.nama.charAt(0).toUpperCase();
                    document.getElementById('initialNav').innerText = initial;
                    document.getElementById('avatarBesar').innerText = initial;
                }

                // Isi Form agar sinkron
                document.getElementById('namaInput').value = data.nama || "";
                document.getElementById('emailInput').value = data.email || "";
                document.getElementById('lahanInput').value = data.lahan || "";
            }
        }

        function saveProfile() {
            const formData = {
                nama: document.getElementById('namaInput').value,
                email: document.getElementById('emailInput').value,
                lahan: document.getElementById('lahanInput').value
            };

            if(!formData.nama) {
                return alert("Mohon maaf, nama tidak boleh dikosongkan.");
            }

            localStorage.setItem('siPanen_Biodata', JSON.stringify(formData));
            alert("Biodata Berhasil Diperbarui!");
            
            renderData(); // Langsung terapkan perubahan
            showPage('dashboard', document.querySelector('.nav-link:first-child')); // Kembali ke dashboard
        }

        window.onclick = function(e) {
            if (!e.target.closest('.relative')) {
                document.getElementById('profileMenu').classList.remove('show');
            }
        }
    </script>
</body>
</html>
